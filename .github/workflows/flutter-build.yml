name: Build XLinux APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Flutter pub get
        run: cd flutter_app && flutter pub get

      - name: Build APK
        run: cd flutter_app && flutter build apk --debug

      - name: Build Release APK
        run: cd flutter_app && flutter build apk --release

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: XLinux-debug
          path: flutter_app/build/app/outputs/flutter-apk/*debug*.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: XLinux-release
          path: flutter_app/build/app/outputs/flutter-apk/*release*.apk
          retention-days: 90

      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: XLinux Build ${{ github.run_number }}
          files: |
            flutter_app/build/app/outputs/flutter-apk/*debug*.apk
            flutter_app/build/app/outputs/flutter-apk/*release*.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
