name: xlinux
description: XLinux Terminal - Lightweight Linux terminal with SSH support.
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  xterm: ^4.0.0
  flutter_pty: ^0.4.2
  url_launcher: ^6.2.0
  shared_preferences: ^2.2.0
  path_provider: ^2.1.0
  permission_handler: ^11.3.0
  google_fonts: ^6.1.0
  provider: ^6.1.0
  dio: ^5.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/bionic_bypass.js
    - assets/resolv.conf
  fonts:
    - family: DejaVuSansMono
      fonts:
        - asset: assets/fonts/DejaVuSansMono.ttf
        - asset: assets/fonts/DejaVuSansMono-Bold.ttf
          weight: 700
